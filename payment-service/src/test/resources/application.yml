spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        # Explicit dialect required by Hibernate 7 when using H2
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  # Redis — unit tests connect to localhost:6379.
  # Testcontainers integration tests override host/port via @DynamicPropertySource.
  # Without a running Redis, Spring will still start because we set cache.type=none.
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  cache:
    type: none   # Disable Spring Cache for unit/state-machine tests.
                 # Testcontainers integration tests re-enable via properties = {"spring.cache.type=redis"}

  # Exclude Kafka for all non-Outbox tests (OutboxIntegrationTest overrides this via @SpringBootTest properties)
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

logging:
  level:
    com.paymentplatform: INFO
    org.springframework.statemachine: WARN
