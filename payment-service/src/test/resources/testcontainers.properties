## Testcontainers configuration for Windows Docker Desktop
##
## Docker Desktop exposes the daemon on TCP port 2375 (Settings → General →
## "Expose daemon on tcp://localhost:2375 without TLS").
## Named pipes return 400 from Docker Desktop's client proxy layer which
## Testcontainers' raw HTTP client cannot negotiate.
##
## On Linux/macOS this is ignored — Unix socket is used automatically.
docker.host=tcp://localhost:2375
