name: CI — Payment Platform

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    name: Build & Test (${{ matrix.module }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        module:
          - payment-service
          - ledger-service
          - notification-service
          - fraud-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run tests for ${{ matrix.module }}
        run: ./gradlew :${{ matrix.module }}:test --no-daemon --continue
        env:
          # Testcontainers — use the runner's Docker daemon directly (no DinD needed)
          TESTCONTAINERS_RYUK_DISABLED: true
          DOCKER_HOST: unix:///var/run/docker.sock

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-${{ matrix.module }}
          path: ${{ matrix.module }}/build/reports/tests/test/
          retention-days: 7

  # ── Docker build verification ─────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Validate docker-compose config
        run: docker compose config --quiet

      - name: Build payment-service Docker image (validates Dockerfile)
        run: docker build -f payment-service.Dockerfile -t payment-service:ci .

      - name: Build ledger-service Docker image
        run: docker build -f ledger-service.Dockerfile -t ledger-service:ci .

      - name: Build notification-service Docker image
        run: docker build -f notification-service.Dockerfile -t notification-service:ci .

      - name: Build fraud-service Docker image
        run: docker build -f fraud-service.Dockerfile -t fraud-service:ci .
