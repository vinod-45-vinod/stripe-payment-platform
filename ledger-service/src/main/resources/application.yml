spring:
  application:
    name: ledger-service

  datasource:
    url: jdbc:postgresql://localhost:5432/ledger_db
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ledger-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # Disable auto-commit — we commit only after successful DB write
      enable-auto-commit: false
    listener:
      ack-mode: RECORD

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: ledger-service
    description: Double-entry bookkeeping (debit customer, credit merchant + platform fee)

logging:
  level:
    com.paymentplatform.ledger: DEBUG
    org.springframework.kafka: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{HH:mm:ss} [%thread] [traceId=%X{traceId:-} paymentId=%X{paymentId:-}] %-5level %logger{36} - %msg%n"

# SpringDoc / Swagger UI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
